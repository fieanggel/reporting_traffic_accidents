name: CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backenddifie:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/backenddifie:latest

      - name: Build & Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontenddifie:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/frontenddifie:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via Frontend Proxy
        uses: appleboy/ssh-action@master
        with:
          host: 98.80.187.179
          username: ubuntu
          key: ${{ secrets.EC2_PEM_KEY }}
          script: |
            # 1. Login Docker di Frontend
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # --- PROSES BACKEND (JALUR KURIR) ---
            # Tarik image ke Frontend (yang punya internet)
            docker pull ${{ secrets.DOCKER_USERNAME }}/backenddifie:latest
            
            # Simpan jadi file tar untuk dikirim ke Backend Private
            docker save ${{ secrets.DOCKER_USERNAME }}/backenddifie:latest > backend_image.tar
            
            # Kirim file tar lewat jalur internal AWS
            scp -o StrictHostKeyChecking=no -i keydifie.pem backend_image.tar ubuntu@10.20.2.77:~/
            
            # Masuk ke Backend Private menggunakan SSH lewat jalur internal
            ssh -o StrictHostKeyChecking=no -i keydifie.pem ubuntu@10.20.2.77 \
              "export DB_PASS_ENV='${{ secrets.DB_PASSWORD }}'; \
               export JWT_SEC_ENV='${{ secrets.JWT_SECRET }}'; \
               export DOCKER_USER='${{ secrets.DOCKER_USERNAME }}'; \
               bash -s" << 'EOF'
              
              # Load image dari file (Bypass Docker Pull yang butuh internet)
              docker load < ~/backend_image.tar
              
              # Stop dan hapus container lama
              docker stop be-server || true && docker rm be-server || true
              
              # Jalankan container dengan --network host untuk akses DNS RDS yang lancar
              docker run -d --name be-server \
                --network host \
                -e DB_HOST=dbdifie.cgxgc8wsgidd.us-east-1.rds.amazonaws.com \
                -e DB_PORT=3306 \
                -e DB_USER=admin \
                -e DB_PASS="$DB_PASS_ENV" \
                -e DB_PASSWORD="$DB_PASS_ENV" \
                -e DB_NAME=reportkecelakaan \
                -e PORT=4000 \
                -e JWT_SECRET="$JWT_SEC_ENV" \
                -e CORS_ALLOWED_ORIGINS=http://98.80.187.179:3000 \
                --restart always "$DOCKER_USER/backenddifie:latest"
              
              # Bersihkan file tar di Backend
              rm ~/backend_image.tar
            EOF
            
            # Bersihkan file tar di Frontend
            rm backend_image.tar

            # --- PROSES FRONTEND ---
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontenddifie:latest
            docker stop fe-server || true && docker rm fe-server || true
            docker run -d --name fe-server -p 3000:3000 --restart always ${{ secrets.DOCKER_USERNAME }}/frontenddifie:latest